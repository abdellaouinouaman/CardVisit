<!DOCTYPE html>
<html lang="fr" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAMANE ABDELAOUI - Professional Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --dark: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --gray: #a0a0a0;
            --whatsapp: #25D366;
            --instagram: #E1306C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .lang-switcher {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            background: #2a2a2a;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .lang-btn {
            background: transparent;
            color: var(--gray);
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .lang-btn.active { color: white; background: var(--primary); border-radius: 5px; }

        .card {
            background-color: var(--card-bg);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        /* تأثير الصورة الديناميكي */
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
            background-color: #333;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: pulse-animation 4s infinite ease-in-out;
        }

        .profile-img:hover { transform: scale(1.15); }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 { margin: 10px 0; font-size: 19px; text-transform: uppercase; letter-spacing: 1px; }
        #tagline { color: var(--primary); font-weight: 600; margin-bottom: 15px; font-size: 13px; text-transform: uppercase; }
        #description { color: var(--gray); line-height: 1.6; font-size: 14px; margin-bottom: 30px; }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn {
            text-decoration: none;
            color: white;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .link-btn:hover { transform: translateY(-3px); background-color: #333; }
        .whatsapp i { color: var(--whatsapp); }
        .instagram i { color: var(--instagram); }
        .phone i { color: var(--primary); }

        [dir="rtl"] .link-btn { flex-direction: row-reverse; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('ar')">AR</button>
    </div>

    <div class="card">
        <img src="noman.jpeg" alt="NOAMANE ABDELAOUI" class="profile-img">
        <h1>NOAMANE ABDELAOUI</h1>
        <div id="tagline">Développeur & Technicien Software</div>
        <p id="description">
            Spécialiste en développement d'applications desktop et sites web. Expert en résolution de problèmes software et maîtrise avancée de la bureautique.
        </p>
        <div class="links">
            <a href="https://wa.me/212780976000" class="link-btn whatsapp" target="_blank"><span>WhatsApp</span><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/nouamanabdellaoui?igsh=dGJsODl0aW1vcDBh" class="link-btn instagram" target="_blank"><span>Instagram</span><i class="fab fa-instagram"></i></a>
            <a href="tel:+212780976000" class="link-btn phone"><span id="txt-call">Appeler Directement</span><i class="fas fa-phone-alt"></i></a>
        </div>
    </div>

    <script>
        const translations = {
            fr: { tagline: "Développeur & Technicien Software", description: "Spécialiste en développement d'applications desktop et sites web. Expert en résolution de problèmes software et maîtrise avancée de la bureautique.", call: "Appeler Directement", dir: "ltr" },
            en: { tagline: "Developer & Software Technician", description: "Specialist in desktop and web application development. Expert in software troubleshooting and advanced office automation.", call: "Call Directly", dir: "ltr" },
            ar: { tagline: "مطور برمجيات وفني سوفت وير", description: "متخصص في تطوير تطبيقات الحاسوب ومواقع الويب. خبير في إصلاح مشاكل السوفت وير ومتخصص في المعلوميات المكتبية (Bureautique).", call: "اتصل بي مباشرة", dir: "rtl" }
        };

        function setLanguage(lang) {
            document.getElementById('tagline').textContent = translations[lang].tagline;
            document.getElementById('description').textContent = translations[lang].description;
            document.getElementById('txt-call').textContent = translations[lang].call;
            document.getElementById('html-tag').setAttribute('dir', translations[lang].dir);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
