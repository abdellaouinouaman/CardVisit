<!DOCTYPE html>
<html lang="fr" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOAMANE ABDELAOUI - Profile</title>
    
    <!-- Meta Tags for Social Media Preview -->
    <meta name="description" content="Développeur & Technicien Software">
    <meta property="og:title" content="NOAMANE ABDELAOUI - Profile">
    <meta property="og:description" content="Développeur & Technicien Software">
    <meta property="og:image" content="profile.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #007bff;
            --dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.95);
            --text: #ffffff;
            --gray: #a0a0a0;
            --whatsapp: #25D366;
            --instagram: #E1306C;
            --linkedin: #0A66C2;
            --github: #ffffff;
            --icon-start: rgba(160, 160, 160, 0.1);
            --icon-end: rgba(220, 220, 220, 0.65);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px;
            position: relative;
        }

        /* --- خلفية الرموز البرمجية المتحركة --- */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-icons-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .floating-icon {
            position: absolute;
            bottom: -80px;
            font-size: 24px;
            user-select: none;
            opacity: 0.1;
            color: var(--icon-start);
            animation: float-up infinite linear;
        }

        @keyframes float-up {
            0% {
                bottom: -80px;
                transform: translateX(0) rotate(0deg);
                opacity: 0.1;
                color: var(--icon-start);
            }
            75% {
                opacity: 0.85;
                color: var(--icon-end);
            }
            90% {
                opacity: 0.7;
            }
            100% {
                bottom: 105vh;
                transform: translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        .icon-1 { left: 8%; font-size: 38px; animation-duration: 13s; animation-delay: 0s; }
        .icon-2 { left: 22%; font-size: 24px; animation-duration: 17s; animation-delay: 2s; }
        .icon-3 { left: 38%; font-size: 32px; animation-duration: 11s; animation-delay: 4s; }
        .icon-4 { left: 52%; font-size: 28px; animation-duration: 19s; animation-delay: 1s; }
        .icon-5 { left: 68%; font-size: 36px; animation-duration: 14s; animation-delay: 3s; }
        .icon-6 { left: 82%; font-size: 26px; animation-duration: 12s; animation-delay: 5s; }
        .icon-7 { left: 92%; font-size: 30px; animation-duration: 18s; animation-delay: 2s; }
        .icon-8 { left: 15%; font-size: 22px; animation-duration: 21s; animation-delay: 6s; }

        /* --- الواجهة --- */
        .lang-switcher {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 25px;
            border: 1px solid #333;
            z-index: 10;
        }

        .lang-btn {
            background: transparent;
            color: var(--gray);
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            border-radius: 20px;
        }

        .lang-btn.active { 
            color: white; 
            background: var(--primary); 
        }

        .card {
            background-color: var(--card-bg);
            padding: 35px 20px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid #333;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
            animation: pulse-animation 4s infinite ease-in-out;
        }

        @keyframes pulse-animation {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        h1 { margin: 10px 0; font-size: 22px; letter-spacing: 1px; }
        #tagline { color: var(--primary); font-weight: 600; margin-bottom: 15px; font-size: 14px; }
        #description { color: var(--gray); line-height: 1.5; font-size: 15px; margin-bottom: 25px; }

        .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .link-btn {
            text-decoration: none;
            color: white;
            background-color: #2a2a2a;
            padding: 16px 20px;
            border-radius: 18px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .link-btn i { font-size: 22px; }
        .link-btn:active { background-color: #383838; transform: scale(0.98); }

        .linkedin i { color: var(--linkedin); }
        .github i { color: var(--github); }
        .whatsapp i { color: var(--whatsapp); }
        .instagram i { color: var(--instagram); }
        .phone i { color: var(--primary); }

        [dir="rtl"] .link-btn { flex-direction: row-reverse; }

        .footer-text { margin-top: 25px; font-size: 11px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- الرموز المتحركة فالخلفية -->
    <div class="bg-animation">
        <div class="bg-icons-container">
            <i class="fas fa-code floating-icon icon-1"></i>
            <i class="fas fa-terminal floating-icon icon-2"></i>
            <i class="fas fa-database floating-icon icon-3"></i>
            <i class="fab fa-python floating-icon icon-4"></i>
            <i class="fab fa-js floating-icon icon-5"></i>
            <i class="fas fa-laptop-code floating-icon icon-6"></i>
            <i class="fas fa-server floating-icon icon-7"></i>
            <i class="fas fa-microchip floating-icon icon-8"></i>
        </div>
    </div>

    <!-- زر تغيير اللغة -->
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('fr')">FR</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('ar')">AR</button>
    </div>

    <!-- الكارد الرئيسية -->
    <div class="card">
        <img src="profile.png" alt="NOAMANE ABDELAOUI" class="profile-img">
        
        <h1>NOAMANE ABDELAOUI</h1>
        <div id="tagline">Développeur & Technicien Software</div>
        
        <p id="description">
            Spécialiste en développement d'applications desktop et sites web. Expert en résolution de problèmes software et maîtrise avancée de la bureautique.
        </p>
        
        <div class="links">
            <a href="https://www.linkedin.com/in/noamane-abdellaoui-5258941b0/" class="link-btn linkedin" target="_blank" rel="noopener">
                <span>LinkedIn</span>
                <i class="fab fa-linkedin"></i>
            </a>

            <a href="https://github.com/abdellaouinouaman" class="link-btn github" target="_blank" rel="noopener">
                <span>GitHub</span>
                <i class="fab fa-github"></i>
            </a>

            <a href="https://wa.me/212780976000" class="link-btn whatsapp" target="_blank" rel="noopener">
                <span>WhatsApp</span>
                <i class="fab fa-whatsapp"></i>
            </a>
            
            <a href="https://www.instagram.com/nouamanabdellaoui?igsh=dGJsODl0aW1vcDBh" class="link-btn instagram" target="_blank" rel="noopener">
                <span>Instagram</span>
                <i class="fab fa-instagram"></i>
            </a>
            
            <a href="tel:+212780976000" class="link-btn phone">
                <span id="txt-call">Appeler Directement</span>
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>

        <div class="footer-text">© 2026 NOAMANE ABDELAOUI</div>
    </div>

    <script>
        const translations = {
            fr: {
                tagline: "Développeur & Technicien Software",
                description: "Spécialiste en développement d'applications desktop et sites web. Expert en résolution de problèmes software et maîtrise avancée de la bureautique.",
                call: "Appeler Directement",
                dir: "ltr"
            },
            en: {
                tagline: "Developer & Software Technician",
                description: "Specialist in desktop and web application development. Expert in software troubleshooting and advanced office automation.",
                call: "Call Directly",
                dir: "ltr"
            },
            ar: {
                tagline: "مطور برمجيات وفني سوفت وير",
                description: "متخصص في تطوير تطبيقات الحاسوب ومواقع الويب. خبير في إصلاح مشاكل السوفت وير ومتخصص في المعلوميات المكتبية (Bureautique).",
                call: "اتصل بي مباشرة",
                dir: "rtl"
            }
        };

        function setLanguage(lang) {
            document.getElementById('tagline').textContent = translations[lang].tagline;
            document.getElementById('description').textContent = translations[lang].description;
            document.getElementById('txt-call').textContent = translations[lang].call;
            
            const htmlTag = document.getElementById('html-tag');
            htmlTag.setAttribute('dir', translations[lang].dir);
            htmlTag.setAttribute('lang', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
